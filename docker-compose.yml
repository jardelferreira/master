services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_app
    restart: unless-stopped
    command: php-fpm
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - .:/var/www
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'OK';"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - estoque

  nginx:
    image: nginx:alpine
    container_name: estoque_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - estoque

  psql:
    image: postgres:15
    container_name: estoque_psql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - psql_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME}"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - estoque

  redis:
    image: redis:alpine
    container_name: estoque_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks:
      - estoque

  mailpit:
    image: axllent/mailpit
    container_name: estoque_mail
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - estoque

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - estoque

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - estoque

networks:
  estoque:
    driver: bridge

volumes:
  psql_data:
